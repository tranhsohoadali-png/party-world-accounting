<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 300" font-family="'Arial Rounded MT Bold','Baloo 2','Trebuchet MS',Arial,sans-serif">
  <defs>
    <linearGradient id="pwSilver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#f4f6f8"/>
      <stop offset="0.55" stop-color="#d4dae0"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="pwBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aed3f0"/>
      <stop offset="1" stop-color="#7fb3e0"/>
    </linearGradient>
  </defs>

  <!-- "Party" — chữ bong bóng xanh, viền navy + highlight trắng -->
  <g font-size="210" font-weight="900">
    <text x="22" y="218" fill="none" stroke="#13315e" stroke-width="20" stroke-linejoin="round">Party</text>
    <text x="22" y="218" fill="none" stroke="#ffffff" stroke-width="8" stroke-linejoin="round">Party</text>
    <text x="22" y="218" fill="url(#pwBlue)">Party</text>
  </g>

  <!-- "World" trong viên thuốc bạc viền navy -->
  <g>
    <rect x="648" y="74" width="350" height="156" rx="78" fill="#1a3a6b"/>
    <rect x="638" y="64" width="350" height="156" rx="78" fill="url(#pwSilver)" stroke="#13315e" stroke-width="11"/>
    <text x="813" y="170" font-size="96" font-weight="800" fill="#13315e" text-anchor="middle">World</text>
  </g>
</svg>
