<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 230" font-family="'Arial Rounded MT Bold','Baloo 2','Trebuchet MS',Arial,sans-serif">
  <defs>
    <linearGradient id="daliG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9bce4a"/>
      <stop offset="1" stop-color="#6fae33"/>
    </linearGradient>
  </defs>

  <!-- Chiếc lá (biểu tượng DALI) đặt phía trên chữ D -->
  <g transform="translate(150,18)">
    <path d="M2,66 C2,30 30,6 64,2 C60,40 34,66 2,66 Z" fill="url(#daliG)"/>
    <path d="M10,60 C28,46 46,28 60,8" stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Chữ "Dali" -->
  <text x="240" y="170" text-anchor="middle" font-size="150" font-weight="800" fill="url(#daliG)" letter-spacing="2">Dali</text>

  <!-- Slogan -->
  <text x="240" y="212" text-anchor="middle" font-size="25" font-weight="600" fill="#7d8a64" letter-spacing="8">TÔ ĐIỂM CUỘC SỐNG</text>
</svg>
