<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" font-family="'Arial Rounded MT Bold','Trebuchet MS',Arial,sans-serif">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7e0"/>
      <stop offset="1" stop-color="#d8edbf"/>
    </linearGradient>
    <linearGradient id="bdali" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9bce4a"/><stop offset="1" stop-color="#6fae33"/>
    </linearGradient>
    <linearGradient id="leaf2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a9d65c"/><stop offset="1" stop-color="#5a9a2a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="280" rx="18" fill="url(#bbg)"/>

  <!-- Lá trang trí -->
  <g opacity="0.9">
    <path d="M70,210 C70,150 120,110 200,104 C193,170 140,210 70,210 Z" fill="url(#leaf2)" opacity="0.55"/>
    <path d="M1130,70 C1130,130 1080,170 1000,176 C1007,110 1060,70 1130,70 Z" fill="url(#leaf2)" opacity="0.55"/>
    <circle cx="250" cy="60" r="7" fill="#8cc63f"/>
    <circle cx="980" cy="220" r="7" fill="#8cc63f"/>
    <circle cx="150" cy="70" r="5" fill="#b6da7c"/>
    <circle cx="1070" cy="210" r="5" fill="#b6da7c"/>
  </g>

  <!-- Logo "Dali" + lá -->
  <g transform="translate(440,55)">
    <g transform="translate(150,-2)">
      <path d="M2,52 C2,24 24,5 50,2 C47,32 27,52 2,52 Z" fill="url(#bdali)"/>
      <path d="M8,47 C22,36 36,22 47,6" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
    </g>
    <text x="160" y="135" text-anchor="middle" font-size="120" font-weight="800" fill="url(#bdali)" letter-spacing="2">Dali</text>
    <text x="160" y="170" text-anchor="middle" font-size="20" font-weight="600" fill="#7d8a64" letter-spacing="6">TÔ ĐIỂM CUỘC SỐNG</text>
  </g>

  <!-- Dòng phụ -->
  <text x="600" y="250" text-anchor="middle" font-size="24" font-weight="700" fill="#5a8e2e" letter-spacing="2">PHẦN MỀM KẾ TOÁN</text>
</svg>
