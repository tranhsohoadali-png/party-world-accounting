<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" font-family="'Arial Rounded MT Bold','Trebuchet MS',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf4fd"/>
      <stop offset="1" stop-color="#cfe3f7"/>
    </linearGradient>
    <linearGradient id="bBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aed3f0"/><stop offset="1" stop-color="#7fb3e0"/>
    </linearGradient>
    <linearGradient id="bSilver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.5" stop-color="#dfe5ea"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="balA" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#bfe0ff"/><stop offset="1" stop-color="#5b9bd5"/>
    </radialGradient>
    <radialGradient id="balB" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#9fd0ef"/><stop offset="1" stop-color="#2f74c0"/>
    </radialGradient>
    <radialGradient id="balC" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#ffe39a"/><stop offset="1" stop-color="#f0b429"/>
    </radialGradient>
    <radialGradient id="balD" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#ffc1d6"/><stop offset="1" stop-color="#e8588c"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="280" rx="18" fill="url(#bg)"/>

  <!-- Confetti -->
  <g opacity="0.85">
    <rect x="90" y="40" width="14" height="14" rx="3" fill="#2f74c0" transform="rotate(20 97 47)"/>
    <rect x="260" y="30" width="12" height="12" rx="3" fill="#f0b429" transform="rotate(-15 266 36)"/>
    <rect x="520" y="26" width="12" height="12" rx="3" fill="#e8588c" transform="rotate(35 526 32)"/>
    <rect x="1080" y="60" width="14" height="14" rx="3" fill="#1a3a6b" transform="rotate(18 1087 67)"/>
    <rect x="980" y="34" width="12" height="12" rx="3" fill="#2f74c0" transform="rotate(-22 986 40)"/>
    <circle cx="170" cy="120" r="6" fill="#f0b429"/>
    <circle cx="640" cy="44" r="6" fill="#2f74c0"/>
    <circle cx="900" cy="120" r="6" fill="#e8588c"/>
    <circle cx="1130" cy="150" r="6" fill="#1a3a6b"/>
    <circle cx="60" cy="190" r="6" fill="#2f74c0"/>
    <path d="M740 30 q10 14 0 28 q-10 14 0 28" stroke="#f0b429" stroke-width="4" fill="none"/>
    <path d="M1010 150 q10 14 0 28 q-10 14 0 28" stroke="#5b9bd5" stroke-width="4" fill="none"/>
  </g>

  <!-- Balloons trái -->
  <g>
    <path d="M120 150 q20 40 0 70" stroke="#9bb6d4" stroke-width="2.5" fill="none"/>
    <ellipse cx="120" cy="110" rx="46" ry="56" fill="url(#balB)"/>
    <path d="M114 164 l12 0 l-6 10 z" fill="#2f74c0"/>
    <path d="M210 175 q-18 36 2 64" stroke="#9bb6d4" stroke-width="2.5" fill="none"/>
    <ellipse cx="210" cy="138" rx="40" ry="50" fill="url(#balC)"/>
    <path d="M204 186 l12 0 l-6 10 z" fill="#f0b429"/>
  </g>

  <!-- Balloons phải -->
  <g>
    <path d="M1080 150 q20 40 0 70" stroke="#9bb6d4" stroke-width="2.5" fill="none"/>
    <ellipse cx="1080" cy="110" rx="46" ry="56" fill="url(#balA)"/>
    <path d="M1074 164 l12 0 l-6 10 z" fill="#5b9bd5"/>
    <path d="M992 175 q-18 36 2 64" stroke="#9bb6d4" stroke-width="2.5" fill="none"/>
    <ellipse cx="992" cy="138" rx="40" ry="50" fill="url(#balD)"/>
    <path d="M986 186 l12 0 l-6 10 z" fill="#e8588c"/>
  </g>

  <!-- Logo "Party World" -->
  <g transform="translate(300,70) scale(0.62)">
    <g font-size="210" font-weight="900">
      <text x="0" y="160" fill="none" stroke="#13315e" stroke-width="20" stroke-linejoin="round">Party</text>
      <text x="0" y="160" fill="none" stroke="#ffffff" stroke-width="8" stroke-linejoin="round">Party</text>
      <text x="0" y="160" fill="url(#bBlue)">Party</text>
    </g>
    <g transform="translate(610,0)">
      <rect x="20" y="20" width="350" height="156" rx="78" fill="#1a3a6b"/>
      <rect x="10" y="10" width="350" height="156" rx="78" fill="url(#bSilver)" stroke="#13315e" stroke-width="11"/>
      <text x="185" y="116" font-size="96" font-weight="800" fill="#13315e" text-anchor="middle">World</text>
    </g>
  </g>

  <!-- Tagline -->
  <text x="600" y="245" text-anchor="middle" font-size="26" font-weight="700" fill="#1a3a6b" letter-spacing="1.5">
    PHẦN MỀM KẾ TOÁN · THẾ GIỚI ĐỒ TIỆC
  </text>
</svg>
