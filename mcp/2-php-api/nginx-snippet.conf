# ============================================================
# Nginx routes cho Party World API
# Thêm vào server block của ketoan.tranhdali.vn
# ============================================================
# Vị trí thường: /etc/nginx/sites-available/ketoan.tranhdali.vn
# Sau khi sửa: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Chặn lộ mã nguồn / file nhạy cảm qua web (đặt TRƯỚC mọi location khác).
# Cần vì thư mục mcp/ (schema.sql, install.sh, server.py, helpers.php) nằm trong webroot.
location ~* \.(sql|sh|py|md|bak|env|lock)$ { deny all; return 404; }

# Route entries với PATH_INFO support: /api/v1/entries, /api/v1/entries/123
location ~ ^/api/v1/(entries|inventory|counterparties|reports)(/.*)?$ {
    # Đặt PATH_INFO cho PHP đọc
    fastcgi_split_path_info ^/api/v1/(entries|inventory|counterparties|reports)(/.*)?$;
    fastcgi_param PATH_INFO $fastcgi_path_info;
    fastcgi_param SCRIPT_FILENAME /var/www/ketoan/api/v1/$1.php;
    include fastcgi_params;
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;
}

# Route MCP server (proxy đến Python service ở port 8765)
location /mcp {
    # BẢO MẬT: chỉ cho dải IP outbound của Anthropic (claude.ai connector) + loopback vào.
    # Server /mcp chạy authless (claude.ai dùng OAuth, không gửi token tĩnh được) nên
    # lớp chặn IP này là rào chính. Nguồn: https://platform.claude.com/docs/en/api/ip-addresses
    allow 160.79.104.0/21;     # Anthropic outbound IPv4
    allow 2607:6bc0::/48;      # Anthropic IPv6
    allow 127.0.0.1;           # test nội bộ trên VPS
    deny all;

    proxy_pass http://127.0.0.1:8765;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE / streaming support cho MCP
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # Cho phép Authorization header pass through
    proxy_set_header Authorization $http_authorization;
}
